version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "chore(ci)"

  - package-ecosystem: "docker"
    directory: "/.package"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "chore(docker)"
