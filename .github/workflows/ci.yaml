name: Signaling server CI

on:
  push:
    branches:
      - main
      - ciTest
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      release_version:
        description: Release version, for example 1.0.0. Defaults to the current POM version without -SNAPSHOT.
        required: false
        type: string
      development_version:
        description: Next development version, for example 1.0.1-SNAPSHOT. Defaults to the Maven Release Plugin suggestion.
        required: false
        type: string

permissions:
  contents: read
  security-events: write
  actions: read

env:
  JAVA_VERSION: '25'
  
jobs:
  build:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven
      - name: Maven verify
        run: mvn --batch-mode --update-snapshots verify

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
      - name: Upload build JAR
        uses: actions/upload-artifact@v7
        with:
          name: build
          path: target
  docker:
    if: github.event_name != 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Build
        uses: docker/setup-buildx-action@v3
      - name: Download mave, build result
        uses: actions/download-artifact@v8
        with:
          name: build
          path: target
      - run: pwd
      - run: ls target/
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: Build
        uses: docker/build-push-action@v4
        with:
          push: true
          tags: f4fez/qsp-signaling-server:latest
          context: .
          file: .package/Dockerfile
          

  release:
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Configure Maven SCM signaling
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Resolve release options
        id: release-options
        shell: bash
        run: |
          release_version="${{ inputs.release_version }}"
          development_version="${{ inputs.development_version }}"

          if [[ -n "${release_version}" ]]; then
            echo "release_args=-DreleaseVersion=${release_version}" >> "${GITHUB_OUTPUT}"
          fi

          if [[ -n "${development_version}" ]]; then
            echo "development_args=-DdevelopmentVersion=${development_version}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Maven release
        run: >
          ./mvnw --batch-mode
          release:prepare release:perform
          -Dgoals=package
          -Darguments=-DskipTests
          ${{ steps.release-options.outputs.release_args }}
          ${{ steps.release-options.outputs.development_args }}

      - name: Resolve created release tag
        id: release
        shell: bash
        run: |
          tag="$(git describe --tags --abbrev=0)"
          version="${tag#v}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          gh release create "${{ steps.release.outputs.tag }}"
          target/checkout/target/*.jar
          --title "${{ steps.release.outputs.tag }}"
          --generate-notes

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Build
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push release image
        uses: docker/build-push-action@v4
        with:
          push: true
          context: target/checkout
          file: target/checkout/.package/Dockerfile
          tags: |
            f4fez/qsp-signaling-server:${{ steps.release.outputs.version }}
            f4fez/qsp-signaling-server:latest

      - name: Publish Docker Hub overview
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
          repository: f4fez/qsp-signaling-server
          readme-filepath: target/checkout/documentation/docker-hub-overview.md
          short-description: QSP Signaling server
          enable-url-completion: true
