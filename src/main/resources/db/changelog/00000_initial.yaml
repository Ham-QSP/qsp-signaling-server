databaseChangeLog:
- changeSet:
    id:  1
    author:  "Florian MAZEN"
    changes:
      - createTable:
          tableName: station
          columns:
            - column:
                name: id
                type: uuid
                defaultValueComputed: gen_random_uuid()
                constraints:
                  primaryKey: true
                  primaryKeyName: pk_station
                  nullable: false
            - column:
                name: main_qrz
                type: varchar(20)
                constraints:
                  nullable: false
                  unique: true
                  uniqueConstraintName: uq_station_main_qrz
            - column:
                name: description
                type: text
                constraints:
                  nullable: false
      - createTable:
          tableName: agent
          columns:
            - column:
                name: id
                type: uuid
                defaultValueComputed: gen_random_uuid()
                constraints:
                  primaryKey: true
                  primaryKeyName: pk_agent
                  nullable: false
            - column:
                name: station_id
                type: uuid
                constraints:
                  nullable: false
            - column:
                name: display_name
                type: varchar(30)
                constraints:
                  nullable: false
            - column:
                name: secret
                type: varchar(256)
      - addUniqueConstraint:
          tableName: agent
          columnNames: station_id, display_name
          constraintName: uq_agent_station_id_display_name
