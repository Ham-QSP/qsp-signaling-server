qsp:
  serverName: "Local dev server"
  serverDescription: "Local execution of the signaling server"

server:
  port: 7080

spring:
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/postgres
    username: postgres
    password: pgpass
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://idp.example.com/issuer

agent:
  hmac:
    keyLength: 64

logging.level:
  fr.f4fez: TRACE
  org.springframework.security: DEBUG